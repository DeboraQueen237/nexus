services:
  - type: web
    name: nexus
    runtime: image
    plan: free
    build:
      dockerfilePath: ./Dockerfile
    preDeployCommand: |
      php artisan migrate --force
      php artisan db:seed --class=RolesAndPermissionsSeeder --force
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: nexus
      - key: REVERB_APP_KEY
        value: nexuskey
      - key: REVERB_APP_SECRET
        value: nexussecret
      - key: REVERB_HOST
        value: 0.0.0.0
      - key: REVERB_PORT
        value: 6001
      - key: REVERB_SCHEME
        value: http
      - key: VITE_REVERB_APP_KEY
        value: nexuskey
      - key: VITE_REVERB_HOST
        value: 0.0.0.0
      - key: VITE_REVERB_PORT
        value: 6001
      - key: VITE_REVERB_SCHEME
        value: http
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql

databases:
  - name: nexus-db
    plan: free