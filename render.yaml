services:
  - type: web
    name: nexus
    runtime: image
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: BROADCAST_CONNECTION
        value: reverb   # ou pusher si tu préfères
      - key: REVERB_APP_ID
        value: nexus
      - key: REVERB_APP_KEY
        value: nexuskey
      - key: REVERB_APP_SECRET
        value: nexussecret
      - key: REVERB_HOST
        value: 0.0.0.0
      - key: REVERB_PORT
        value: 6001
      - key: REVERB_SCHEME
        value: http
      - key: VITE_REVERB_APP_KEY
        value: nexuskey
      - key: VITE_REVERB_HOST
        value: 0.0.0.0   # Attention : le navigateur utilisera le domaine public
      - key: VITE_REVERB_PORT
        value: 6001
      - key: VITE_REVERB_SCHEME
        value: http      # Mais en réalité, le navigateur fera wss:// via le proxy Nginx
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: nexus-db
    plan: free