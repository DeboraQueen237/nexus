services:
  - type: web
    name: nexus-web
    runtime: php
    buildCommand: composer install --no-dev --optimize-autoloader && npm ci && npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=8080
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: nexus
      - key: REVERB_APP_KEY
        value: nexuskey
      - key: REVERB_APP_SECRET
        value: nexussecret
      - key: REVERB_HOST
        value: 0.0.0.0
      - key: REVERB_PORT
        value: 6001
      - key: REVERB_SCHEME
        value: http
      - key: VITE_REVERB_APP_KEY
        value: nexuskey
      - key: VITE_REVERB_HOST
        value: 0.0.0.0
      - key: VITE_REVERB_PORT
        value: 6001
      - key: VITE_REVERB_SCHEME
        value: http

  - type: worker
    name: nexus-worker
    runtime: php
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: sh -c "php artisan reverb:start --host=0.0.0.0 --port=6001 & php artisan queue:work --sleep=3 --tries=3"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        value: nexus
      - key: REVERB_APP_KEY
        value: nexuskey
      - key: REVERB_APP_SECRET
        value: nexussecret
      - key: REVERB_HOST
        value: 0.0.0.0
      - key: REVERB_PORT
        value: 6001
      - key: REVERB_SCHEME
        value: http

databases:
  - name: nexus-db
    plan: free